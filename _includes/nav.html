<!-- Bio popup (positioned via JS, outside navbar to avoid clipping) -->
<div class="bio-popup" id="bioPopup" hidden>
  <div class="bio-popup-inner">
    <p class="bio-popup-bio">{{ site.author.bio }}</p>
    <ul class="bio-popup-facts">
      <li><span class="bio-fact-label">Age</span><span class="bio-fact-value">{{ site.author.age }}</span></li>
      <li><span class="bio-fact-label">Status</span><span class="bio-fact-value">{{ site.author.relationship }}</span></li>
      <li><span class="bio-fact-label">Hobbies</span><span class="bio-fact-value">{{ site.author.hobbies | join: ", " }}</span></li>
    </ul>
  </div>
</div>
