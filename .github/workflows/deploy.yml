name: Deploy Jekyll site to GitHub Pages

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch ImageKit photo lists
        env:
          IMAGEKIT_PRIVATE_KEY: ${{ secrets.IMAGEKIT_PRIVATE_KEY }}
        run: |
          fetch_folder() {
            local folder="$1"
            local outfile="$2"
            curl -s \
              -u "${IMAGEKIT_PRIVATE_KEY}:" \
              "https://api.imagekit.io/v1/files?path=${folder}&fileType=image&limit=500&sort=DESC_CREATED" \
              > "$outfile"
          }
          fetch_folder "Portraits"  "_data/photos_portraits.json"
          fetch_folder "Landscapes" "_data/photos_landscapes.json"

      - name: Enrich shorts metadata from Bunny Stream
        env:
          BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
          BUNNY_LIBRARY_ID: "628897"
        run: |
          python3 << 'PYEOF'
          import os, re, json, urllib.request, datetime, unicodedata

          LIBRARY_ID = os.environ["BUNNY_LIBRARY_ID"]
          API_KEY    = os.environ["BUNNY_API_KEY"]

          def bunny_get(video_id):
              url = f"https://video.bunnycdn.com/library/{LIBRARY_ID}/videos/{video_id}"
              req = urllib.request.Request(url, headers={"AccessKey": API_KEY})
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          def slugify(text):
              s = unicodedata.normalize("NFKD", text).encode("ascii", "ignore").decode()
              s = re.sub(r"[^a-z0-9]+", "-", s.lower()).strip("-")
              return s

          def get_fm(content, key):
              m = re.search(rf'^{key}:\s*(.+)$', content, re.MULTILINE)
              if not m: return None
              val = m.group(1).strip().strip('"').strip("'")
              return val if val else None

          def set_fm(content, key, value):
              line = f'{key}: "{value}"'
              if re.search(rf'^{key}:', content, re.MULTILINE):
                  return re.sub(rf'^{key}:.*$', line, content, flags=re.MULTILINE)
              parts = content.split("---")
              if len(parts) >= 3:
                  parts[1] = parts[1].rstrip("\n") + f"\n{line}\n"
              return "---".join(parts)

          changed = []
          for fname in os.listdir("_shorts"):
              if not fname.endswith(".md"): continue
              path = os.path.join("_shorts", fname)
              content = open(path).read()

              video_id = get_fm(content, "video_id")
              if not video_id:
                  print(f"⏭  {fname}: no video_id, skipping")
                  continue

              if all([get_fm(content, k) for k in ["title", "slug", "date", "thumbnail"]]):
                  print(f"✅  {fname}: already enriched")
                  continue

              print(f"🔍  Fetching Bunny metadata for {fname}...")
              try:
                  data = bunny_get(video_id)
              except Exception as e:
                  print(f"❌  {video_id}: {e}")
                  continue

              title      = data.get("title", "")
              desc       = data.get("description") or ""
              date_raw   = data.get("dateUploaded", "")
              thumb_file = data.get("thumbnailFileName") or ""

              if not title:
                  print(f"⚠️  No title for {video_id}, skipping")
                  continue

              slug = slugify(title)
              try:
                  dt = datetime.datetime.fromisoformat(date_raw.replace("Z", "+00:00"))
                  date_str = dt.strftime("%Y-%m-%d")
              except Exception:
                  date_str = datetime.date.today().isoformat()

              thumb_val = get_fm(content, "thumbnail") or ""

              if not get_fm(content, "title"):     content = set_fm(content, "title", title)
              if not get_fm(content, "slug"):      content = set_fm(content, "slug", slug)
              if not get_fm(content, "date"):      content = set_fm(content, "date", date_str)
              if not get_fm(content, "caption") and desc:
                                                   content = set_fm(content, "caption", desc)

              expected = f"{slug}.md"
              if fname != expected:
                  new_path = os.path.join("_shorts", expected)
                  os.rename(path, new_path)
                  path = new_path
                  print(f"   Renamed {fname} → {expected}")

              open(path, "w").write(content)
              changed.append(path)
              print(f"   ✅  title={title}, slug={slug}, date={date_str}")

          print(f"\nDone. {len(changed)} file(s) enriched.")
          PYEOF

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
