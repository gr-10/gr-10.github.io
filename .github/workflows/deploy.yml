name: Deploy Jekyll site to GitHub Pages

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch ImageKit photo lists
        env:
          IMAGEKIT_PRIVATE_KEY: ${{ secrets.IMAGEKIT_PRIVATE_KEY }}
        run: |
          fetch_folder() {
            local folder="$1"
            local outfile="$2"
            curl -s \
              -u "${IMAGEKIT_PRIVATE_KEY}:" \
              "https://api.imagekit.io/v1/files?path=${folder}&fileType=image&limit=500&sort=DESC_CREATED" \
              > "$outfile"
          }
          fetch_folder "Portraits"  "_data/photos_portraits.json"
          fetch_folder "Landscapes" "_data/photos_landscapes.json"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
