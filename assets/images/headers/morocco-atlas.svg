<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="40%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#c2713a"/>
    </linearGradient>
    <linearGradient id="sand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8956c"/>
      <stop offset="100%" style="stop-color:#8b5e3c"/>
    </linearGradient>
  </defs>
  <!-- Sky gradient (dusk) -->
  <rect width="600" height="800" fill="url(#sky)"/>
  <!-- Stars -->
  <circle cx="60" cy="50" r="1.5" fill="#fff" opacity="0.9"/>
  <circle cx="130" cy="30" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="200" cy="70" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="380" cy="40" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="500" cy="60" r="1" fill="#fff" opacity="0.8"/>
  <circle cx="550" cy="90" r="1.5" fill="#fff" opacity="0.5"/>
  <!-- Crescent moon -->
  <circle cx="480" cy="100" r="30" fill="#ffeaa0"/>
  <circle cx="493" cy="92" r="26" fill="#1e3a5f"/>
  <!-- Atlas mountain range -->
  <polygon points="0,480 80,300 180,420 280,260 380,380 460,280 560,380 600,340 600,600 0,600" fill="#5c3d2e"/>
  <polygon points="280,260 380,380 320,300" fill="#8b7355" opacity="0.5"/>
  <polygon points="460,280 560,380 510,310" fill="#8b7355" opacity="0.4"/>
  <!-- Desert sand dunes -->
  <ellipse cx="0" cy="680" rx="200" ry="80" fill="url(#sand)"/>
  <ellipse cx="300" cy="700" rx="280" ry="70" fill="url(#sand)"/>
  <ellipse cx="600" cy="660" rx="220" ry="90" fill="url(#sand)"/>
  <rect x="0" y="700" width="600" height="100" fill="#8b5e3c"/>
  <!-- Kasbah/fort silhouette -->
  <rect x="220" y="420" width="160" height="180" fill="#2d1a0e"/>
  <rect x="215" y="415" width="15" height="40" fill="#2d1a0e"/>
  <rect x="370" y="415" width="15" height="40" fill="#2d1a0e"/>
  <rect x="240" y="415" width="10" height="30" fill="#2d1a0e"/>
  <rect x="265" y="415" width="10" height="30" fill="#2d1a0e"/>
  <rect x="325" y="415" width="10" height="30" fill="#2d1a0e"/>
  <rect x="350" y="415" width="10" height="30" fill="#2d1a0e"/>
  <!-- Window lights -->
  <rect x="245" y="460" width="18" height="22" rx="9" fill="#f0a500" opacity="0.8"/>
  <rect x="285" y="460" width="18" height="22" rx="9" fill="#f0a500" opacity="0.6"/>
  <rect x="325" y="460" width="18" height="22" rx="9" fill="#f0a500" opacity="0.9"/>
  <!-- Arch doorway -->
  <rect x="285" y="545" width="30" height="55" fill="#0a0a0a"/>
  <ellipse cx="300" cy="545" rx="15" ry="12" fill="#0a0a0a"/>
  <!-- Palm trees -->
  <rect x="168" y="520" width="7" height="100" fill="#4a3728"/>
  <ellipse cx="172" cy="510" rx="28" ry="18" fill="#2d5a27"/>
  <ellipse cx="158" cy="516" rx="20" ry="12" fill="#2d5a27"/>
  <ellipse cx="186" cy="514" rx="22" ry="12" fill="#2d5a27"/>
  <rect x="425" y="530" width="7" height="90" fill="#4a3728"/>
  <ellipse cx="429" cy="520" rx="26" ry="16" fill="#2d5a27"/>
  <ellipse cx="416" cy="526" rx="18" ry="11" fill="#2d5a27"/>
  <!-- Label -->
  <text x="300" y="775" font-family="Georgia, serif" font-size="18" fill="#f0a500" text-anchor="middle" opacity="0.9">Morocco</text>
</svg>
