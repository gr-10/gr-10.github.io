<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d4f5"/>
      <stop offset="60%" style="stop-color:#d4eaf7"/>
      <stop offset="100%" style="stop-color:#e8c9a0"/>
    </linearGradient>
    <linearGradient id="mtn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a5568"/>
      <stop offset="100%" style="stop-color:#2d3748"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="600" height="800" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="300" cy="180" r="55" fill="#f6d860" opacity="0.9"/>
  <circle cx="300" cy="180" r="70" fill="#f6d860" opacity="0.2"/>
  <!-- Clouds -->
  <ellipse cx="100" cy="140" rx="70" ry="25" fill="white" opacity="0.7"/>
  <ellipse cx="130" cy="130" rx="50" ry="20" fill="white" opacity="0.8"/>
  <ellipse cx="480" cy="110" rx="60" ry="22" fill="white" opacity="0.65"/>
  <ellipse cx="510" cy="100" rx="45" ry="18" fill="white" opacity="0.75"/>
  <!-- Far mountains (snow-capped) -->
  <polygon points="0,400 120,200 240,380 360,180 480,300 600,220 600,500 0,500" fill="url(#mtn)"/>
  <polygon points="240,380 360,180 420,280" fill="white" opacity="0.5"/>
  <polygon points="360,180 480,300 420,270" fill="white" opacity="0.4"/>
  <!-- Patagonia valley -->
  <rect x="0" y="490" width="600" height="310" fill="#2d5a27"/>
  <!-- Foreground rocky terrain -->
  <ellipse cx="100" cy="600" rx="120" ry="40" fill="#3d4a2e"/>
  <ellipse cx="500" cy="580" rx="140" ry="45" fill="#3d4a2e"/>
  <!-- Trail path -->
  <path d="M 280 800 Q 290 680 260 560 Q 250 520 270 500" stroke="#c8a96e" stroke-width="5" fill="none" opacity="0.7"/>
  <!-- Hiker silhouette -->
  <circle cx="265" cy="490" r="10" fill="#1a1a1a"/>
  <line x1="265" y1="500" x2="265" y2="530" stroke="#1a1a1a" stroke-width="4"/>
  <line x1="265" y1="510" x2="250" y2="525" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="265" y1="510" x2="280" y2="525" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="265" y1="530" x2="255" y2="555" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="265" y1="530" x2="275" y2="555" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Trekking pole -->
  <line x1="255" y1="510" x2="242" y2="555" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Label -->
  <text x="300" y="775" font-family="Georgia, serif" font-size="18" fill="#f0a500" text-anchor="middle" opacity="0.9">Patagonia</text>
</svg>
