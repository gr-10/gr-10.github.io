<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff7043"/>
      <stop offset="40%" style="stop-color:#ffa726"/>
      <stop offset="100%" style="stop-color:#fff176"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="300" cy="300" r="60" fill="#fff176" opacity="0.9"/>
  <circle cx="300" cy="300" r="80" fill="#fff176" opacity="0.2"/>
  <!-- Silhouette mountains -->
  <polygon points="0,800 0,520 100,380 200,500 300,350 400,480 500,400 600,460 600,800" fill="#1a0a05"/>
  <!-- Lone hiker silhouette -->
  <circle cx="290" cy="345" r="9" fill="#0a0505"/>
  <line x1="290" y1="354" x2="290" y2="378" stroke="#0a0505" stroke-width="4"/>
  <line x1="290" y1="362" x2="278" y2="374" stroke="#0a0505" stroke-width="3"/>
  <line x1="290" y1="362" x2="302" y2="374" stroke="#0a0505" stroke-width="3"/>
  <line x1="290" y1="378" x2="282" y2="398" stroke="#0a0505" stroke-width="3"/>
  <line x1="290" y1="378" x2="298" y2="398" stroke="#0a0505" stroke-width="3"/>
  <!-- Trekking pole -->
  <line x1="278" y1="362" x2="268" y2="398" stroke="#0a0505" stroke-width="2.5"/>
  <text x="300" y="775" font-family="Georgia, serif" font-size="16" fill="#1a0a05" text-anchor="middle">Sunset on the W-Trek</text>
</svg>
