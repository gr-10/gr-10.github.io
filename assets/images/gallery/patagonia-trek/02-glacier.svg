<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#a0c8e0"/>
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9ab5"/>
      <stop offset="100%" style="stop-color:#2d7a95"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#sky)"/>
  <!-- Glacier wall -->
  <rect x="0" y="200" width="600" height="360" fill="#c8e8f5"/>
  <rect x="0" y="200" width="600" height="60" fill="#ddf0fa"/>
  <!-- Ice cracks/texture -->
  <line x1="100" y1="220" x2="150" y2="400" stroke="#9dd0e8" stroke-width="3" opacity="0.6"/>
  <line x1="250" y1="200" x2="200" y2="500" stroke="#9dd0e8" stroke-width="2" opacity="0.5"/>
  <line x1="400" y1="210" x2="450" y2="450" stroke="#9dd0e8" stroke-width="3" opacity="0.6"/>
  <line x1="520" y1="230" x2="480" y2="520" stroke="#b0ddf0" stroke-width="2" opacity="0.5"/>
  <!-- Crevasses -->
  <polygon points="80,300 110,300 95,380" fill="#5ab0d0" opacity="0.7"/>
  <polygon points="300,280 330,280 315,360" fill="#5ab0d0" opacity="0.7"/>
  <polygon points="460,310" fill="#5ab0d0" opacity="0.7"/>
  <!-- Water -->
  <rect x="0" y="560" width="600" height="240" fill="url(#water)"/>
  <!-- Iceberg chunks -->
  <polygon points="80,560 130,520 180,560" fill="white" opacity="0.9"/>
  <polygon points="380,560 430,530 490,560" fill="white" opacity="0.85"/>
  <polygon points="220,560 260,545 300,560" fill="white" opacity="0.8"/>
  <text x="300" y="775" font-family="Georgia, serif" font-size="16" fill="#fff" text-anchor="middle">Perito Moreno</text>
</svg>
