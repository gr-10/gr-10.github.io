<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d4f5"/>
      <stop offset="70%" style="stop-color:#d4eaf7"/>
      <stop offset="100%" style="stop-color:#e8c9a0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#sky)"/>
  <!-- Torres peaks -->
  <polygon points="80,700 160,250 240,700" fill="#5a6a7a"/>
  <polygon points="200,700 290,180 380,700" fill="#4a5a6a"/>
  <polygon points="340,700 420,280 500,700" fill="#5a6a7a"/>
  <!-- Snow caps -->
  <polygon points="160,250 190,310 130,310" fill="white"/>
  <polygon points="290,180 320,250 260,250" fill="white"/>
  <polygon points="420,280 445,340 395,340" fill="white"/>
  <!-- Clouds -->
  <ellipse cx="480" cy="120" rx="70" ry="22" fill="white" opacity="0.8"/>
  <ellipse cx="100" cy="160" rx="55" ry="18" fill="white" opacity="0.7"/>
  <!-- Lake -->
  <rect x="0" y="680" width="600" height="120" fill="#5b9bd5" opacity="0.7"/>
  <!-- Reflection -->
  <polygon points="160,750 80,800 240,800" fill="#3a5a7a" opacity="0.3"/>
  <polygon points="290,780 200,800 380,800" fill="#3a5a7a" opacity="0.3"/>
  <text x="300" y="775" font-family="Georgia, serif" font-size="16" fill="#fff" text-anchor="middle">Torres del Paine</text>
</svg>
