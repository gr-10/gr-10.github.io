<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="#c8813a"/>
  <!-- Medina alley -->
  <rect x="180" y="0" width="240" height="800" fill="#d4956a"/>
  <!-- Walls with texture -->
  <rect x="0" y="0" width="185" height="800" fill="#b87040"/>
  <rect x="415" y="0" width="185" height="800" fill="#b87040"/>
  <!-- Window left wall -->
  <rect x="30" y="150" width="80" height="100" rx="40" fill="#8b4a20"/>
  <rect x="40" y="160" width="60" height="80" rx="30" fill="#5a2a10"/>
  <rect x="55" y="175" width="12" height="50" fill="#c8813a" opacity="0.4"/>
  <!-- Window right wall -->
  <rect x="490" y="200" width="80" height="100" rx="40" fill="#8b4a20"/>
  <rect x="500" y="210" width="60" height="80" rx="30" fill="#5a2a10"/>
  <!-- Arch at end of alley (vanishing point) -->
  <rect x="240" y="400" width="120" height="200" fill="#a06030"/>
  <ellipse cx="300" cy="400" rx="60" ry="45" fill="#a06030"/>
  <rect x="255" y="410" width="90" height="190" fill="#7a4020"/>
  <ellipse cx="300" cy="410" rx="45" ry="35" fill="#7a4020"/>
  <!-- Light beyond arch -->
  <ellipse cx="300" cy="460" rx="35" ry="40" fill="#ffd89b" opacity="0.6"/>
  <!-- Lanterns -->
  <line x1="220" y1="0" x2="220" y2="80" stroke="#8b4a20" stroke-width="2"/>
  <rect x="205" y="75" width="30" height="40" rx="4" fill="#f0a500" opacity="0.9"/>
  <line x1="380" y1="0" x2="380" y2="100" stroke="#8b4a20" stroke-width="2"/>
  <rect x="365" y="95" width="30" height="40" rx="4" fill="#f0a500" opacity="0.8"/>
  <!-- Figure silhouette far end -->
  <circle cx="300" cy="550" r="10" fill="#1a0a05"/>
  <rect x="296" y="560" width="8" height="30" fill="#1a0a05"/>
  <text x="300" y="775" font-family="Georgia, serif" font-size="16" fill="#f0a500" text-anchor="middle">Marrakech Medina</text>
</svg>
