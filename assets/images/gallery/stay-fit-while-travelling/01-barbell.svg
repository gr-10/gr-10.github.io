<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="#0f0f0f"/>
  <rect x="0" y="0" width="600" height="800" fill="url(#gym)"/>
  <defs>
    <linearGradient id="gym" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f"/>
      <stop offset="100%" style="stop-color:#1a1010"/>
    </linearGradient>
  </defs>
  <!-- Barbell -->
  <rect x="100" y="370" width="400" height="18" rx="9" fill="#555"/>
  <!-- Left plates -->
  <rect x="100" y="330" width="30" height="98" rx="6" fill="#333"/>
  <rect x="136" y="340" width="22" height="78" rx="5" fill="#444"/>
  <!-- Right plates -->
  <rect x="470" y="330" width="30" height="98" rx="6" fill="#333"/>
  <rect x="442" y="340" width="22" height="78" rx="5" fill="#444"/>
  <!-- Collar clamps -->
  <rect x="162" y="355" width="14" height="48" rx="4" fill="#f0a500"/>
  <rect x="424" y="355" width="14" height="48" rx="4" fill="#f0a500"/>
  <!-- Gym floor -->
  <rect x="0" y="680" width="600" height="120" fill="#111"/>
  <!-- Rubber mat lines -->
  <line x1="0" y1="690" x2="600" y2="690" stroke="#222" stroke-width="3"/>
  <line x1="0" y1="720" x2="600" y2="720" stroke="#222" stroke-width="2"/>
  <!-- Weight rack silhouette -->
  <rect x="30" y="200" width="12" height="480" fill="#1e1e1e"/>
  <rect x="558" y="200" width="12" height="480" fill="#1e1e1e"/>
  <rect x="30" y="200" width="540" height="12" fill="#1e1e1e"/>
  <!-- Rack holes -->
  <circle cx="50" cy="260" r="5" fill="#2a2a2a"/>
  <circle cx="50" cy="310" r="5" fill="#2a2a2a"/>
  <circle cx="50" cy="360" r="5" fill="#2a2a2a"/>
  <circle cx="550" cy="260" r="5" fill="#2a2a2a"/>
  <circle cx="550" cy="310" r="5" fill="#2a2a2a"/>
  <circle cx="550" cy="360" r="5" fill="#2a2a2a"/>
  <!-- Spotlight glow -->
  <ellipse cx="300" cy="200" rx="100" ry="30" fill="#f0a500" opacity="0.08"/>
  <text x="300" y="760" font-family="Georgia, serif" font-size="16" fill="#f0a500" text-anchor="middle">The Barbell</text>
</svg>
