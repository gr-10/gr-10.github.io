<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87ceeb"/>
      <stop offset="100%" style="stop-color:#ffd89b"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#sky)"/>
  <!-- City skyline -->
  <rect x="0" y="420" width="600" height="380" fill="#1a1a2e"/>
  <rect x="30" y="320" width="60" height="200" fill="#1e1e3a"/>
  <rect x="110" y="280" width="45" height="240" fill="#252545"/>
  <rect x="165" y="350" width="55" height="210" fill="#1e1e3a"/>
  <rect x="240" y="240" width="70" height="280" fill="#252545"/>
  <rect x="330" y="300" width="50" height="220" fill="#1e1e3a"/>
  <rect x="395" y="260" width="65" height="260" fill="#252545"/>
  <rect x="475" y="340" width="50" height="180" fill="#1e1e3a"/>
  <rect x="535" y="380" width="55" height="140" fill="#252545"/>
  <!-- Windows -->
  <rect x="45" y="340" width="8" height="8" fill="#f0a500" opacity="0.8"/>
  <rect x="60" y="340" width="8" height="8" fill="#f0a500" opacity="0.5"/>
  <rect x="45" y="360" width="8" height="8" fill="#f0a500" opacity="0.6"/>
  <rect x="255" y="270" width="8" height="8" fill="#f0a500" opacity="0.9"/>
  <rect x="275" y="270" width="8" height="8" fill="#f0a500" opacity="0.5"/>
  <rect x="410" y="280" width="8" height="8" fill="#f0a500" opacity="0.7"/>
  <!-- Running path -->
  <rect x="0" y="640" width="600" height="30" fill="#555" opacity="0.7"/>
  <!-- Runner silhouette mid-stride -->
  <circle cx="300" cy="570" r="16" fill="#0a0a0a"/>
  <line x1="300" y1="586" x2="300" y2="620" stroke="#0a0a0a" stroke-width="5"/>
  <line x1="300" y1="596" x2="274" y2="614" stroke="#0a0a0a" stroke-width="4"/>
  <line x1="300" y1="596" x2="322" y2="610" stroke="#0a0a0a" stroke-width="4"/>
  <line x1="300" y1="620" x2="280" y2="646" stroke="#0a0a0a" stroke-width="4"/>
  <line x1="300" y1="620" x2="318" y2="638" stroke="#0a0a0a" stroke-width="4"/>
  <text x="300" y="760" font-family="Georgia, serif" font-size="16" fill="#f0a500" text-anchor="middle">City Run</text>
</svg>
