<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="#0d0d14"/>
  <!-- Hotel room window with city view -->
  <rect x="80" y="100" width="440" height="320" rx="4" fill="#1a2a4a"/>
  <rect x="90" y="110" width="420" height="300" fill="#0a1628"/>
  <!-- City lights in window -->
  <rect x="110" y="200" width="5" height="5" fill="#f0a500" opacity="0.9"/>
  <rect x="130" y="220" width="5" height="5" fill="#fff" opacity="0.6"/>
  <rect x="160" y="190" width="5" height="5" fill="#f0a500" opacity="0.7"/>
  <rect x="200" y="230" width="5" height="5" fill="#fff" opacity="0.5"/>
  <rect x="250" y="180" width="5" height="5" fill="#f0a500" opacity="0.8"/>
  <rect x="320" y="210" width="5" height="5" fill="#fff" opacity="0.6"/>
  <rect x="370" y="195" width="5" height="5" fill="#f0a500" opacity="0.9"/>
  <rect x="420" y="225" width="5" height="5" fill="#fff" opacity="0.5"/>
  <rect x="460" y="185" width="5" height="5" fill="#f0a500" opacity="0.7"/>
  <!-- Floor / yoga mat -->
  <rect x="100" y="560" width="400" height="12" rx="6" fill="#2d5a27" opacity="0.8"/>
  <!-- Person in yoga pose (warrior) -->
  <!-- torso -->
  <line x1="300" y1="480" x2="300" y2="540" stroke="#e0e0e0" stroke-width="5"/>
  <!-- head -->
  <circle cx="300" cy="468" r="14" fill="#e0e0e0"/>
  <!-- arms wide -->
  <line x1="300" y1="500" x2="240" y2="480" stroke="#e0e0e0" stroke-width="4"/>
  <line x1="300" y1="500" x2="360" y2="480" stroke="#e0e0e0" stroke-width="4"/>
  <!-- legs in lunge -->
  <line x1="300" y1="540" x2="246" y2="572" stroke="#e0e0e0" stroke-width="4"/>
  <line x1="300" y1="540" x2="354" y2="560" stroke="#e0e0e0" stroke-width="4"/>
  <line x1="246" y1="572" x2="220" y2="572" stroke="#e0e0e0" stroke-width="4"/>
  <line x1="354" y1="560" x2="380" y2="572" stroke="#e0e0e0" stroke-width="4"/>
  <text x="300" y="760" font-family="Georgia, serif" font-size="16" fill="#f0a500" text-anchor="middle">Hotel Room Workout</text>
</svg>
