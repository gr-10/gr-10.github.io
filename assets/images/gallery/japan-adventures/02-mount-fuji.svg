<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87ceeb"/>
      <stop offset="100%" style="stop-color:#ffd89b"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#sky)"/>
  <!-- Fuji -->
  <polygon points="100,700 300,200 500,700" fill="white"/>
  <polygon points="200,700 300,200 400,700" fill="#e8e8e8"/>
  <polygon points="240,420 300,200 360,420" fill="white"/>
  <!-- Forest base -->
  <rect x="0" y="680" width="600" height="120" fill="#2d5a27"/>
  <ellipse cx="100" cy="680" rx="60" ry="30" fill="#2d5a27"/>
  <ellipse cx="200" cy="685" rx="50" ry="28" fill="#336b2a"/>
  <ellipse cx="400" cy="682" rx="55" ry="29" fill="#2d5a27"/>
  <ellipse cx="500" cy="678" rx="65" ry="31" fill="#336b2a"/>
  <!-- Lake reflection -->
  <ellipse cx="300" cy="730" rx="120" ry="20" fill="#87ceeb" opacity="0.4"/>
  <text x="300" y="775" font-family="Georgia, serif" font-size="16" fill="#f0a500" text-anchor="middle">Mount Fuji</text>
</svg>
