<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="#0a0a10"/>
  <!-- Pull-up bar -->
  <rect x="100" y="200" width="400" height="14" rx="7" fill="#555"/>
  <rect x="100" y="180" width="14" height="100" fill="#333"/>
  <rect x="486" y="180" width="14" height="100" fill="#333"/>
  <!-- Lifter hanging (top of pull-up, chin over bar) -->
  <circle cx="300" cy="235" r="17" fill="#1e1e1e"/>
  <!-- arms up gripping bar -->
  <line x1="300" y1="218" x2="248" y2="206" stroke="#1e1e1e" stroke-width="5"/>
  <line x1="300" y1="218" x2="352" y2="206" stroke="#1e1e1e" stroke-width="5"/>
  <!-- torso -->
  <line x1="300" y1="252" x2="300" y2="360" stroke="#1e1e1e" stroke-width="8"/>
  <!-- legs hanging slightly bent -->
  <line x1="300" y1="360" x2="276" y2="440" stroke="#1e1e1e" stroke-width="7"/>
  <line x1="300" y1="360" x2="324" y2="440" stroke="#1e1e1e" stroke-width="7"/>
  <line x1="276" y1="440" x2="264" y2="510" stroke="#1e1e1e" stroke-width="6"/>
  <line x1="324" y1="440" x2="336" y2="510" stroke="#1e1e1e" stroke-width="6"/>
  <!-- Progress board on wall -->
  <rect x="60" y="420" width="120" height="160" rx="4" fill="#141414"/>
  <rect x="70" y="430" width="100" height="140" rx="3" fill="#0d0d0d"/>
  <text x="120" y="458" font-family="monospace" font-size="11" fill="#f0a500">Week 1</text>
  <text x="120" y="474" font-family="monospace" font-size="10" fill="#555">3×5 @60kg</text>
  <text x="120" y="490" font-family="monospace" font-size="11" fill="#f0a500">Week 8</text>
  <text x="120" y="506" font-family="monospace" font-size="10" fill="#555">3×8 @80kg</text>
  <text x="120" y="522" font-family="monospace" font-size="11" fill="#2ecc71">+20kg ↑</text>
  <!-- Glow -->
  <ellipse cx="300" cy="140" rx="90" ry="20" fill="#f0a500" opacity="0.06"/>
  <text x="300" y="760" font-family="Georgia, serif" font-size="16" fill="#f0a500" text-anchor="middle">Pull-Up Progress</text>
</svg>
