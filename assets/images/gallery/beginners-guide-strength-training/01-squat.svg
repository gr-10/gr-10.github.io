<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="#0a0a10"/>
  <!-- Squat rack -->
  <rect x="170" y="180" width="16" height="500" fill="#2a2a2a"/>
  <rect x="414" y="180" width="16" height="500" fill="#2a2a2a"/>
  <rect x="170" y="180" width="260" height="16" fill="#2a2a2a"/>
  <!-- Barbell with squat load -->
  <rect x="130" y="356" width="340" height="16" rx="8" fill="#666"/>
  <!-- Plates -->
  <rect x="130" y="318" width="36" height="92" rx="7" fill="#333"/>
  <rect x="170" y="330" width="24" height="68" rx="5" fill="#444"/>
  <rect x="434" y="318" width="36" height="92" rx="7" fill="#333"/>
  <rect x="406" y="330" width="24" height="68" rx="5" fill="#444"/>
  <!-- Gold collars -->
  <rect x="198" y="344" width="16" height="40" rx="4" fill="#f0a500"/>
  <rect x="386" y="344" width="16" height="40" rx="4" fill="#f0a500"/>
  <!-- Lifter silhouette (squat position) -->
  <!-- body low position -->
  <circle cx="300" cy="330" r="18" fill="#1a1a1a"/>
  <!-- torso angled forward -->
  <line x1="300" y1="348" x2="290" y2="420" stroke="#1a1a1a" stroke-width="7"/>
  <!-- arms on bar -->
  <line x1="295" y1="368" x2="222" y2="362" stroke="#1a1a1a" stroke-width="5"/>
  <line x1="295" y1="368" x2="378" y2="362" stroke="#1a1a1a" stroke-width="5"/>
  <!-- thighs (parallel squat) -->
  <line x1="290" y1="420" x2="240" y2="460" stroke="#1a1a1a" stroke-width="7"/>
  <line x1="290" y1="420" x2="340" y2="460" stroke="#1a1a1a" stroke-width="7"/>
  <!-- lower legs -->
  <line x1="240" y1="460" x2="230" y2="540" stroke="#1a1a1a" stroke-width="6"/>
  <line x1="340" y1="460" x2="350" y2="540" stroke="#1a1a1a" stroke-width="6"/>
  <!-- Chalk cloud -->
  <ellipse cx="300" cy="440" rx="60" ry="15" fill="white" opacity="0.04"/>
  <!-- Spotlight -->
  <ellipse cx="300" cy="150" rx="80" ry="20" fill="#f0a500" opacity="0.07"/>
  <text x="300" y="760" font-family="Georgia, serif" font-size="16" fill="#f0a500" text-anchor="middle">Back Squat</text>
</svg>
