<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="#0a0a10"/>
  <!-- Deadlift -->
  <!-- Bar on floor -->
  <rect x="80" y="510" width="440" height="16" rx="8" fill="#666"/>
  <!-- Plates on floor -->
  <rect x="80" y="450" width="44" height="136" rx="10" fill="#333"/>
  <rect x="130" y="468" width="28" height="100" rx="7" fill="#3a3a3a"/>
  <rect x="476" y="450" width="44" height="136" rx="10" fill="#333"/>
  <rect x="442" y="468" width="28" height="100" rx="7" fill="#3a3a3a"/>
  <!-- Collars -->
  <rect x="162" y="496" width="18" height="42" rx="4" fill="#f0a500"/>
  <rect x="420" y="496" width="18" height="42" rx="4" fill="#f0a500"/>
  <!-- Lifter at top of deadlift (standing, bar at hips) -->
  <circle cx="300" cy="290" r="20" fill="#1e1e1e"/>
  <!-- torso upright -->
  <line x1="300" y1="310" x2="300" y2="440" stroke="#1e1e1e" stroke-width="8"/>
  <!-- arms down gripping bar -->
  <line x1="300" y1="340" x2="248" y2="512" stroke="#1e1e1e" stroke-width="5"/>
  <line x1="300" y1="340" x2="352" y2="512" stroke="#1e1e1e" stroke-width="5"/>
  <!-- legs straight -->
  <line x1="300" y1="440" x2="270" y2="560" stroke="#1e1e1e" stroke-width="7"/>
  <line x1="300" y1="440" x2="330" y2="560" stroke="#1e1e1e" stroke-width="7"/>
  <!-- feet -->
  <line x1="270" y1="560" x2="240" y2="568" stroke="#1e1e1e" stroke-width="5"/>
  <line x1="330" y1="560" x2="360" y2="568" stroke="#1e1e1e" stroke-width="5"/>
  <!-- Spotlight -->
  <ellipse cx="300" cy="150" rx="80" ry="22" fill="#f0a500" opacity="0.06"/>
  <text x="300" y="760" font-family="Georgia, serif" font-size="16" fill="#f0a500" text-anchor="middle">Deadlift</text>
</svg>
