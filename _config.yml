title: Grenston George
tagline: "Personal Diary"
description: >-
  The personal diary of Grenston George — daily logs on travel, fitness,
  thoughts, and everything in between.
url: "https://gr-10.github.io"
baseurl: ""

author:
  name: Grenston George
  email: ""
  avatar: /assets/images/profile.jpg
  instagram: "gr10.life"
  strava: "2047574881"

# Build settings
theme: null          # custom theme — no minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# GitHub Pages — use Actions-based deployment (supports Jekyll 4)
# Set "Source" to "GitHub Actions" in repo Settings → Pages

# Pagination
paginate: 10
paginate_path: "/diary/page:num/"

# Collections
permalink: /diary/:year/:month/:day/:title/

# Markdown
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - .bundle

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Grenston George"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Categories used for filtering
travel_categories:
  - Travel
  - Adventure
  - Hiking
fitness_categories:
  - Fitness
  - Training
  - Nutrition
