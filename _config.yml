title: Grenston's Life
tagline: "Personal Diary"
description: >-
  The personal diary of Grenston George — daily logs on travel, fitness,
  thoughts, and everything in between.
url: "https://gr10.life"
baseurl: ""
imagekit_url: "https://ik.imagekit.io/gr10"
bunny_library_id: 628897
og_image: "https://gr10.life/assets/images/profile.jpg"

author:
  name: Grenston George
  email: "grenston.ks@gmail.com"
  avatar: /assets/images/profile.jpg
  instagram: "gr10.life"
  strava: "2047574881"
  age: 29
  relationship: "In a relationship"
  hobbies:
    - Travel
    - Photography
    - Fitness
    - Short-form video
  bio: >-
    Be Yourself.

# Build settings
theme: null          # custom theme — no minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# GitHub Pages — use Actions-based deployment (supports Jekyll 4)
# Set "Source" to "GitHub Actions" in repo Settings → Pages

# Pagination
paginate: 10
paginate_path: "/diary/page:num/"

# Collections
permalink: /diary/:year/:month/:day/:title/

# Markdown
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - .bundle

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Grenston George"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Categories used for filtering
travel_categories:
  - Travel
  - Adventure
  - Hiking
fitness_categories:
  - Fitness
  - Training
  - Nutrition
