---
layout: default
title: Photos
permalink: /photos/
---

<div class="photos-page">

  <!-- PAGE HEADER -->
  <div class="photos-page-header">
    <p class="section-label">Gallery</p>
    <h1 class="reels-page-title">Photos</h1>
  </div>

  <!-- TAB NAV -->
  <div class="photos-tabs" role="tablist">
    <button class="photos-tab active" data-tab="portraits"  role="tab" aria-selected="true">Portraits</button>
    <button class="photos-tab"        data-tab="landscapes" role="tab" aria-selected="false">Landscapes</button>
  </div>

  <!-- TAB: Portraits -->
  <div class="photos-panel active" id="tab-portraits" role="tabpanel">
    <div class="photos-grid photos-grid--portraits" id="portraitGrid">
      {% for photo in site.data.photos_portraits %}
      <div class="photo-item"
           data-src="https://ik.imagekit.io/gr10{{ photo.filePath }}"
           data-title="{{ photo.name | replace: '_', ' ' | replace: '-', ' ' | split: '.' | first }}">
        <button class="photo-thumb-link" aria-label="View photo">
          <img src="https://ik.imagekit.io/gr10/tr:w-400,q-75{{ photo.filePath }}"
               alt="{{ photo.name }}" loading="lazy" class="photo-thumb">
          <div class="photo-overlay">
            <span class="photo-overlay-title">{{ photo.name | replace: '_', ' ' | replace: '-', ' ' | split: '.' | first }}</span>
          </div>
        </button>
      </div>
      {% endfor %}
    </div>
  </div>

  <!-- TAB: Landscapes -->
  <div class="photos-panel" id="tab-landscapes" role="tabpanel" hidden>
    <div class="photos-grid photos-grid--landscapes" id="landscapeGrid">
      {% for photo in site.data.photos_landscapes %}
      <div class="photo-item"
           data-src="https://ik.imagekit.io/gr10{{ photo.filePath }}"
           data-title="{{ photo.name | replace: '_', ' ' | replace: '-', ' ' | split: '.' | first }}">
        <button class="photo-thumb-link" aria-label="View photo">
          <img src="https://ik.imagekit.io/gr10/tr:w-600,q-75{{ photo.filePath }}"
               alt="{{ photo.name }}" loading="lazy" class="photo-thumb">
          <div class="photo-overlay">
            <span class="photo-overlay-title">{{ photo.name | replace: '_', ' ' | replace: '-', ' ' | split: '.' | first }}</span>
          </div>
        </button>
      </div>
      {% endfor %}
    </div>
  </div>

</div>

<!-- Lightbox (shared) -->
<div class="lightbox" id="lightbox" aria-hidden="true">
  <button class="lightbox-close" id="lightboxClose" aria-label="Close">&#x2715;</button>
  <button class="lightbox-prev"  id="lightboxPrev"  aria-label="Previous">&#x2039;</button>
  <button class="lightbox-next"  id="lightboxNext"  aria-label="Next">&#x203a;</button>
  <div class="lightbox-img-wrap">
    <img src="" alt="" id="lightboxImg" class="lightbox-img">
  </div>
  <div class="lightbox-caption" id="lightboxCaption"></div>
</div>
<div class="lightbox-backdrop" id="lightboxBackdrop"></div>
